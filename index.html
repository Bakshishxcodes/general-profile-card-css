<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>General profile card</title>
</head>
<body>
    <div class="box">
        <div class="upperband"></div>
        <div class="image">
            <img src="pfp.jpg" alt="pfp of bakshish">
        </div>
        <h2 class="name">Bakshish D. Nohara</h2>
        <h3 class="about">A <span class="dev">Developer</span></h3>
        <div class="socialbox">
        <h3 class="sociallabel">My Socials:</h3>
        <div class="socialbar">
            <a href="https://github.com/Bakshishxcodes" id="github">
                <i class='bx bxl-github'></i>
            </a>
            <a href="https://www.linkedin.com/in/bakshish-d-599514351/" id="linkedin">
                <i class='bx bxl-linkedin'></i>
            </a>
            <a href="https://x.com/BakshishDNohara" id="twitter">
                 <i class='bx bxl-twitter'></i>
            </a>
        </div>
        <div class="buttonsbar">
            <span class="buttonbox">
                <button class="button">Subscribe</button>
            </span>
            <span class="buttonbox">
                <button class="button">Message</button>
            </span>
        </div>
        </div>
    </div>
</body>
</html>
